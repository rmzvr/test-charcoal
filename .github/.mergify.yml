merge_protections:
  - name: Block merging stacked branches to non-main
    if:
      - base != main
    success_conditions:
      - base = main

pull_request_rules:
  - name: Comment on stacked branch PRs
    conditions:
      - base != main
    actions:
      comment:
        message: "Cannot merge — this is a stacked branch. Merge the bottom branch to main first."